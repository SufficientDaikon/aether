function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function populatePhaseTables() {
  DATA.phases.forEach(phase => {
    const tbody = document.getElementById(`phase-${phase.id}-tests`);
    if (!tbody || !phase.results) return;
    phase.results.forEach(r => {
      const tr = document.createElement('tr');
      tr.className = `test-row ${r.status}`;
      const scoreStr = (r.score !== undefined && r.maxScore !== undefined) ? `${r.score}/${r.maxScore}` : '--';
      const statusClass = r.status === 'pass' ? 'badge-pass' : r.status === 'error' ? 'badge-error' : 'badge-fail';
      const statusLabel = r.status.toUpperCase();
      const dur = r.durationMs < 1000 ? `${r.durationMs}ms` : `${(r.durationMs/1000).toFixed(1)}s`;
      const shortDetails = r.details.length > 120 ? r.details.slice(0,120) + '...' : r.details;
      tr.innerHTML = `
        <td class="test-id">${r.id}</td>
        <td class="test-name">${r.name}</td>
        <td><span class="badge ${statusClass}">${statusLabel}</span></td>
        <td>${scoreStr}</td>
        <td>${dur}</td>
        <td class="test-details">${shortDetails}</td>`;
      tr.addEventListener('click', () => {
        let detail = tr.nextElementSibling;
        if (detail && detail.classList.contains('detail-row')) {
          detail.remove();
          return;
        }
        detail = document.createElement('tr');
        detail.className = 'detail-row';
        const errorHtml = r.error ? `<div class="error-text"><strong>Error:</strong> <code>${escapeHtml(r.error)}</code></div>` : '';
        detail.innerHTML = `<td colspan="6"><div class="detail-content"><p>${escapeHtml(r.details)}</p>${errorHtml}</div></td>`;
        tr.after(detail);
      });
      tbody.appendChild(tr);
    });
  });
}

function togglePhase(header) {
  const card = header.parentElement;
  card.classList.toggle('expanded');
  const icon = header.querySelector('.expand-icon');
  icon.textContent = card.classList.contains('expanded') ? '\u25B2' : '\u25BC';
}

  const ctx = document.getElementById('radarChart');

  const scores = [9.4, 9.1, 8.6, 8.6, 10.0, 9.7, 10.0, 9.0, 9.0, 7.5];
  new Chart(ctx, {
    type: 'radar',
    data: {
      labels,
      datasets: [{
        label: 'AETHER Score',
        data: scores,
        backgroundColor: 'rgba(59,130,246,0.15)',
        borderColor: 'rgba(59,130,246,0.8)',

      },{
        label: 'Maximum',
        data: Array(10).fill(10),
        backgroundColor: 'transparent',
        borderColor: 'rgba(100,116,139,0.25)',
        borderWidth: 1,
        borderDash: [5,5],
        pointRadius: 0,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      scales: {
        r: {
          min: 0, max: 10,
          ticks: { stepSize: 2, color: '#64748b', backdropColor: 'transparent', font: { size: 11 } },
          grid: { color: 'rgba(100,116,139,0.15)' },
          pointLabels: { color: '#f1f5f9', font: { size: 11 } },
          angleLines: { color: 'rgba(100,116,139,0.15)' },
        }
      },
      plugins: { legend: { display: false } }
    }
  });
}

function copyCode(btn) {
  const code = btn.closest('.code-block').querySelector('code').textContent;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(code).then(() => showCopied(btn)).catch(() => fallbackCopy(code, btn));
  } else { fallbackCopy(code, btn); }
}
function fallbackCopy(text, btn) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); showCopied(btn); } catch(e) { btn.textContent = 'Failed'; }
  document.body.removeChild(ta);
}
function showCopied(btn) {
  btn.textContent = 'Copied!'; btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
}

function filterFeatures(status) {
  document.querySelectorAll('.feature-row').forEach(row => {
    if (status === 'all') { row.style.display = ''; return; }
    row.style.display = row.dataset.status === status ? '' : 'none';
  });
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === status);
  });
}

function initAnimations() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.animate-in').forEach(el => observer.observe(el));
}

function initProgressRings() {
  document.querySelectorAll('.progress-ring-fill').forEach(circle => {
    const pct = parseFloat(circle.dataset.pct) || 0;
    const r = 40, c = 2 * Math.PI * r;
    circle.style.strokeDasharray = c;
    circle.style.strokeDashoffset = c * (1 - pct / 100);
  });
}

function initScoreBars() {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.querySelector('.score-bar-fill')?.classList.add('animated');
        obs.unobserve(e.target);
      }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.score-bar').forEach(bar => obs.observe(bar));
}

function initCounters() {
  document.querySelectorAll('.counter').forEach(el => {
    const target = parseInt(el.dataset.target);
    const divisor = el.dataset.divisor ? parseInt(el.dataset.divisor) : 100;
    let start = null;
    const duration = 1500;
    function step(ts) {
      if (!start) start = ts;
      const progress = Math.min((ts - start) / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      const val = eased * target;
      el.textContent = (val / divisor).toFixed(2);
      if (progress < 1) requestAnimationFrame(step);
    }
    const obs = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting) {
        requestAnimationFrame(step);
        obs.unobserve(el);
      }
    });
    obs.observe(el);
  });
}

function initScrollSpy() {
  const sections = document.querySelectorAll('section[id]');
  const links = document.querySelectorAll('#sidebar a[href^="#"]');
  const spy = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        links.forEach(l => l.classList.remove('active'));
        const link = document.querySelector(`#sidebar a[href="#${e.target.id}"]`);
        if (link) link.classList.add('active');
      }
    });
  }, { threshold: 0.2, rootMargin: '-80px 0px -60% 0px' });
  sections.forEach(s => spy.observe(s));
}

function initHamburger() {
  const btn = document.getElementById('hamburger');
  const sidebar = document.getElementById('sidebar');
  if (!btn || !sidebar) return;
  btn.addEventListener('click', () => sidebar.classList.toggle('open'));
  document.querySelectorAll('#sidebar a').forEach(a => {
    a.addEventListener('click', () => sidebar.classList.remove('open'));
  });
}

document.addEventListener('DOMContentLoaded', () => {
  populatePhaseTables();
  initRadarChart();
  initAnimations();
  initProgressRings();
  initScoreBars();
  initCounters();
  initScrollSpy();
  initHamburger();
});
