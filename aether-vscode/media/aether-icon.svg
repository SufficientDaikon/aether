<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a9eff"/>
      <stop offset="100%" stop-color="#5cb85c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#1e1e2e"/>
  <!-- Orbital rings -->
  <circle cx="64" cy="64" r="46" fill="none" stroke="url(#ring)" stroke-width="1.5" opacity="0.3"/>
  <circle cx="64" cy="64" r="32" fill="none" stroke="url(#ring)" stroke-width="1" opacity="0.2" stroke-dasharray="4,6"/>
  <!-- Connection lines -->
  <line x1="64" y1="30" x2="38" y2="55" stroke="#4a9eff" stroke-width="1.5" opacity="0.4"/>
  <line x1="64" y1="30" x2="90" y2="55" stroke="#4a9eff" stroke-width="1.5" opacity="0.4"/>
  <line x1="38" y1="55" x2="28" y2="85" stroke="#5cb85c" stroke-width="1" opacity="0.3"/>
  <line x1="38" y1="55" x2="48" y2="88" stroke="#5cb85c" stroke-width="1" opacity="0.3"/>
  <line x1="90" y1="55" x2="80" y2="88" stroke="#5cb85c" stroke-width="1" opacity="0.3"/>
  <line x1="90" y1="55" x2="100" y2="85" stroke="#5cb85c" stroke-width="1" opacity="0.3"/>
  <!-- Master node (top) -->
  <circle cx="64" cy="30" r="10" fill="url(#core)" filter="url(#glow)"/>
  <text x="64" y="34" text-anchor="middle" fill="white" font-size="12" font-weight="bold">⚡</text>
  <!-- Manager nodes (middle) -->
  <circle cx="38" cy="55" r="7" fill="#4a9eff" opacity="0.8"/>
  <circle cx="90" cy="55" r="7" fill="#4a9eff" opacity="0.8"/>
  <!-- Worker nodes (bottom) -->
  <circle cx="28" cy="85" r="5" fill="#5cb85c" opacity="0.6"/>
  <circle cx="48" cy="88" r="5" fill="#5cb85c" opacity="0.6"/>
  <circle cx="80" cy="88" r="5" fill="#5cb85c" opacity="0.6"/>
  <circle cx="100" cy="85" r="5" fill="#5cb85c" opacity="0.6"/>
  <!-- AETHER text -->
  <text x="64" y="115" text-anchor="middle" fill="white" font-size="14" font-family="system-ui" font-weight="700" letter-spacing="3" opacity="0.8">AETHER</text>
</svg>
