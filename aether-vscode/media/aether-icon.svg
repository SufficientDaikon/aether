<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Core circle -->
  <circle cx="12" cy="12" r="3" fill="currentColor" opacity="0.8"/>
  <!-- Orbital ring -->
  <circle cx="12" cy="12" r="9" opacity="0.4"/>
  <!-- Nodes: master (top), managers (mid), workers (bottom-sides) -->
  <circle cx="12" cy="3" r="2" fill="currentColor"/>
  <circle cx="5" cy="8" r="1.5" fill="currentColor" opacity="0.7"/>
  <circle cx="19" cy="8" r="1.5" fill="currentColor" opacity="0.7"/>
  <circle cx="4" cy="16" r="1.2" fill="currentColor" opacity="0.5"/>
  <circle cx="20" cy="16" r="1.2" fill="currentColor" opacity="0.5"/>
  <circle cx="8" cy="20" r="1.2" fill="currentColor" opacity="0.5"/>
  <circle cx="16" cy="20" r="1.2" fill="currentColor" opacity="0.5"/>
  <!-- Connection lines -->
  <line x1="12" y1="5" x2="12" y2="9" opacity="0.3"/>
  <line x1="12" y1="12" x2="5" y2="8" opacity="0.3"/>
  <line x1="12" y1="12" x2="19" y2="8" opacity="0.3"/>
  <line x1="5" y1="8" x2="4" y2="16" opacity="0.2"/>
  <line x1="19" y1="8" x2="20" y2="16" opacity="0.2"/>
</svg>
